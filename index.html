<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor | Pro Dashboard</title>
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        
        /* Settings Panel */
        .settings-panel { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #334155; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .control-group { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        
        /* Dashboard Cards */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid #334155; padding: 24px; border-radius: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .card.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .card-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 10px 0; color: var(--text); }
        .badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .badge-vol { background: var(--danger); }
        .badge-stable { background: var(--success); }

        button { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        input[type="range"] { accent-color: var(--accent); width: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem;">Market<span style="color:var(--accent)">Monitor</span>.exe</h1>
        <button id="mainBtn" onclick="toggleSystem()">INITIALIZE SYSTEM</button>
    </div>

    <div class="settings-panel">
        <div style="font-weight: bold; color: var(--accent);">System Configuration</div>
        <div class="settings-grid">
            <div class="control-group">
                <input type="checkbox" id="check_USDJPY" checked> <label>USD/JPY FX</label>
            </div>
            <div class="control-group">
                <input type="checkbox" id="check_SPY" checked> <label>S&P 500 (SPY)</label>
            </div>
            <div class="control-group">
                <input type="checkbox" id="check_YIELD" checked> <label>10Y Treasury</label>
            </div>
            <div class="control-group" style="grid-column: span 2;">
                <label>Loop Interval: <span id="intervalVal">15</span>s</label>
                <input type="range" id="intervalRange" min="5" max="60" value="15" oninput="document.getElementById('intervalVal').innerText = this.value">
            </div>
        </div>
    </div>

    <div id="marketGrid" class="market-grid">
        </div>
</div>

<script>
    const API_KEY = '469B1ZB3NB71W4X1';
    let isRunning = false;
    let systemLoop;
    let priceHistory = {};

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    async function fetchUpdate(type, symbol) {
        let url = `https://www.alphavantage.co/query?apikey=${API_KEY}&`;
        if (type === 'FX') url += `function=CURRENCY_EXCHANGE_RATE&from_currency=USD&to_currency=JPY`;
        if (type === 'EQUITY') url += `function=GLOBAL_QUOTE&symbol=${symbol}`;
        if (type === 'RATE') url += `function=TREASURY_YIELD&interval=daily`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            let price, label;

            if (type === 'FX') {
                price = parseFloat(data["Realtime Currency Exchange Rate"]["5. Exchange Rate"]);
                label = "USD/JPY";
            } else if (type === 'EQUITY') {
                price = parseFloat(data["Global Quote"]["05. price"]);
                label = symbol;
            } else if (type === 'RATE') {
                price = parseFloat(data["data"][0]["value"]);
                label = "10Y Yield";
            }

            processData(label, price);
        } catch (e) { console.error("Limit/Error", e); }
    }

    function processData(label, price) {
        if (!priceHistory[label]) priceHistory[label] = [];
        const oldPrice = priceHistory[label].slice(-1)[0];
        priceHistory[label].push(price);

        let statusBadge = '<span class="badge badge-stable">STABLE</span>';
        if (oldPrice) {
            const change = Math.abs((price - oldPrice) / oldPrice);
            if (change > 0.0020) {
                statusBadge = '<span class="badge badge-vol">VOLATILE</span>';
                speak(`Warning, ${label} moved over point 2 percent.`);
            }
        }

        speak(`${label} is ${price.toFixed(2)}`);
        updateCard(label, price, statusBadge);
    }

    function updateCard(label, price, badge) {
        const id = `card-${label.replace('/','')}`;
        let card = document.getElementById(id);
        if (!card) {
            card = document.createElement('div');
            card.id = id;
            card.className = 'card active';
            document.getElementById('marketGrid').appendChild(card);
        }
        card.innerHTML = `
            <div class="card-header"><span>${label}</span> ${badge}</div>
            <div class="price">${price.toFixed(3)}</div>
            <div style="font-size:0.7rem; color:#64748b">Last Check: ${new Date().toLocaleTimeString()}</div>
        `;
    }

    function toggleSystem() {
        isRunning = !isRunning;
        const btn = document.getElementById('mainBtn');
        
        if (isRunning) {
            btn.innerText = "STOP SYSTEM";
            btn.style.background = "#ef4444";
            speak("System online. Beginning market loop.");
            startLoop();
        } else {
            btn.innerText = "INITIALIZE SYSTEM";
            btn.style.background = "#38bdf8";
            clearInterval(systemLoop);
        }
    }

    function startLoop() {
        const run = () => {
            if (document.getElementById('check_USDJPY').checked) fetchUpdate('FX', 'USDJPY');
            setTimeout(() => {
                if (document.getElementById('check_SPY').checked) fetchUpdate('EQUITY', 'SPY');
            }, 2000);
            setTimeout(() => {
                if (document.getElementById('check_YIELD').checked) fetchUpdate('RATE', 'TREASURY_YIELD');
            }, 4000);
        };
        run();
        const seconds = document.getElementById('intervalRange').value * 1000;
        systemLoop = setInterval(run, seconds);
    }
</script>
</body>
</html>
