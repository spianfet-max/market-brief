<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor | G10 Quant Edition</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --red: #f43f5e; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        
        /* Configuration Section */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155; }
        .config-item { display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; }
        
        /* Market Grid */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; position: relative; transition: 0.3s; }
        .card.alert { border-color: var(--red); box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .card h3 { margin: 0; font-size: 0.9rem; color: var(--accent); }
        .price { font-size: 1.8rem; font-weight: bold; margin: 8px 0; }
        .stat { font-size: 0.75rem; color: #94a3b8; }

        button { background: var(--accent); color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input[type="number"], select { background: #0f172a; color: white; border: 1px solid #334155; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>Market<span style="color:var(--accent)">Monitor</span></h1>
        <button id="sysBtn" onclick="toggleSystem()">START MONITORING</button>
    </div>

    <div class="config-grid">
        <div class="config-item">
            <label>Sensitivity (% Move)</label>
            <input type="number" id="threshold" value="0.20" step="0.01">
        </div>
        <div class="config-item">
            <label>Time Window (Seconds)</label>
            <input type="number" id="window" value="60">
        </div>
        <div class="config-item">
            <label>G10 Pair Selection</label>
            <div class="checkbox-group">
                <label><input type="checkbox" class="pair-check" value="EUR" checked> EUR/USD</label>
                <label><input type="checkbox" class="pair-check" value="JPY" checked> USD/JPY</label>
                <label><input type="checkbox" class="pair-check" value="GBP" checked> GBP/USD</label>
                <label><input type="checkbox" class="pair-check" value="AUD"> AUD/USD</label>
                <label><input type="checkbox" class="pair-check" value="CAD"> USD/CAD</label>
                <label><input type="checkbox" class="pair-check" value="CHF"> USD/CHF</label>
                <label><input type="checkbox" class="pair-check" value="NZD"> NZD/USD</label>
                <label><input type="checkbox" class="pair-check" value="SEK"> USD/SEK</label>
            </div>
        </div>
    </div>

    <div id="marketGrid" class="market-grid"></div>
</div>

<script>
    const API_KEY = '469B1ZB3NB71W4X1';
    let isRunning = false;
    let dataBuffer = {}; // Format: { "JPY": [{t: timestamp, p: price}, ...] }
    let loop;

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        window.speechSynthesis.speak(u);
    }

    async function fetchPair(symbol) {
        // Free API logic: Staggered calls to avoid 5-per-minute limit
        const url = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=USD&to_currency=${symbol}&apikey=${API_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const price = parseFloat(data["Realtime Currency Exchange Rate"]["5. Exchange Rate"]);
            analyze(symbol, price);
        } catch (e) { console.log("Limit hit"); }
    }

    function analyze(symbol, currentPrice) {
        if (!dataBuffer[symbol]) dataBuffer[symbol] = [];
        const now = Date.now();
        const windowMs = document.getElementById('window').value * 1000;
        const threshold = document.getElementById('threshold').value / 100;

        // Clean old data
        dataBuffer[symbol] = dataBuffer[symbol].filter(d => (now - d.t) < windowMs);
        
        if (dataBuffer[symbol].length > 0) {
            const startPoint = dataBuffer[symbol][0];
            const change = (currentPrice - startPoint.p) / startPoint.p;

            if (Math.abs(change) >= threshold) {
                triggerAlert(symbol, currentPrice, change);
            }
        }

        dataBuffer[symbol].push({t: now, p: currentPrice});
        updateUI(symbol, currentPrice);
    }

    function triggerAlert(sym, price, change) {
        const direction = change > 0 ? "up" : "down";
        speak(`Volatility Alert. USD ${sym} is ${direction} ${(Math.abs(change)*100).toFixed(2)} percent.`);
        document.getElementById(`card-${sym}`).classList.add('alert');
        setTimeout(() => document.getElementById(`card-${sym}`).classList.remove('alert'), 5000);
    }

    function updateUI(sym, price) {
        let el = document.getElementById(`card-${sym}`);
        if (!el) {
            el = document.createElement('div');
            el.id = `card-${sym}`;
            el.className = 'card';
            document.getElementById('marketGrid').appendChild(el);
        }
        el.innerHTML = `<h3>USD/${sym}</h3><div class="price">${price.toFixed(3)}</div><div class="stat">Monitoring ${document.getElementById('window').value}s window</div>`;
    }

    function toggleSystem() {
        isRunning = !isRunning;
        const btn = document.getElementById('sysBtn');
        if (isRunning) {
            btn.innerText = "STOP"; btn.style.background = "#f43f5e";
            speak("G10 Quant Monitor Active.");
            const pairs = Array.from(document.querySelectorAll('.pair-check:checked')).map(c => c.value);
            let i = 0;
            loop = setInterval(() => {
                fetchPair(pairs[i]);
                i = (i + 1) % pairs.length;
            }, 15000); // 15s delay between pairs to respect 25-calls-per-day limit
        } else {
            clearInterval(loop);
            btn.innerText = "START MONITORING"; btn.style.background = "#38bdf8";
        }
    }
</script>
</body>
</html>
