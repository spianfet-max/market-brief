<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor Elite | Yokohama Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #11141b; --accent: #00f2ff;
            --success: #00ff9d; --danger: #ff0055; --text: #ffffff; --glass: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 25px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header & News */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--glass); padding-bottom: 20px; }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        .ticker { background: #000; padding: 12px; border-radius: 12px; margin-bottom: 30px; font-size: 1rem; color: var(--accent); overflow: hidden; white-space: nowrap; border: 1px solid var(--glass); }
        .ticker-text { display: inline-block; animation: scroll 40s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Settings Panel */
        .panel { background: var(--surface); border: 1px solid var(--glass); padding: 30px; border-radius: 24px; margin-bottom: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .group label { display: block; font-size: 0.8rem; color: #666; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        .btn-launch { background: var(--accent); color: #000; border: none; padding: 18px 45px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 1.1rem; }
        .btn-launch:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--accent); }

        /* The Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: var(--surface); border: 2px solid var(--glass); padding: 35px; border-radius: 35px; transition: 0.4s; position: relative; }
        .card:hover { border-color: var(--accent); }
        .price { font-size: 4.2rem; font-weight: 900; margin: 15px 0; letter-spacing: -3px; font-variant-numeric: tabular-nums; }
        .alert-flash { border-color: var(--danger) !important; background: rgba(255, 0, 85, 0.1); animation: flash 0.5s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.6; } }

        /* Client Target Fields */
        .target-input { background: #000; border: 1px solid #334155; color: var(--success); padding: 8px; border-radius: 8px; width: 100px; font-weight: bold; text-align: center; }
        
        .asset-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">MARKET<span>MONITOR</span></div>
        <button id="sysBtn" class="btn-launch" onclick="toggleSystem()">Launch Core</button>
    </header>

    <div class="ticker">
        <div class="ticker-text">
            [BREAKING NEWS] BOJ MONETARY POLICY REVIEW UNDERWAY... US 10Y TREASURY YIELD VOLATILITY INCREASING... NIKKEI 225 GAINS MOMENTUM... USD/JPY HITS CRITICAL RESISTANCE...
        </div>
    </div>

    <div class="panel">
        <div class="group">
            <label>Asset Universe (Select to Loop)</label>
            <div class="asset-list">
                <label><input type="checkbox" class="pc" value="JPY" checked> USD/JPY</label>
                <label><input type="checkbox" class="pc" value="EUR" checked> EUR/USD</label>
                <label><input type="checkbox" class="pc" value="GBP" checked> GBP/USD</label>
                <label><input type="checkbox" class="pc" value="AUD"> AUD/USD</label>
                <label><input type="checkbox" class="pc" value="SPY" checked> S&P 500</label>
                <label><input type="checkbox" class="pc" value="TREASURY"> 10Y Yield</label>
            </div>
        </div>
        <div class="group">
            <label>Quant Sensitivity & Time (Sec)</label>
            <input type="number" id="threshold" value="0.20" step="0.01" style="width:70px"> % Move |
            <input type="number" id="interval" value="15" style="width:70px"> Interval
        </div>
    </div>

    <div id="marketGrid" class="grid"></div>
</div>

<script>
    const API_KEY = '469B1ZB3NB71W4X1';
    let isRunning = false, loop, prices = {};

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.pitch = 0.85; u.rate = 1.0;
        window.speechSynthesis.speak(u);
    }

    async function fetchUpdate(sym) {
        let url = `https://www.alphavantage.co/query?apikey=${API_KEY}&function=CURRENCY_EXCHANGE_RATE&from_currency=USD&to_currency=${sym}`;
        if(sym === 'SPY') url = `https://www.alphavantage.co/query?apikey=${API_KEY}&function=GLOBAL_QUOTE&symbol=SPY`;
        if(sym === 'TREASURY') url = `https://www.alphavantage.co/query?apikey=${API_KEY}&function=TREASURY_YIELD&interval=daily`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            let p;
            if(sym === 'SPY') p = parseFloat(data["Global Quote"]["05. price"]);
            else if(sym === 'TREASURY') p = parseFloat(data["data"][0]["value"]);
            else p = parseFloat(data["Realtime Currency Exchange Rate"]["5. Exchange Rate"]);
            
            process(sym, p);
        } catch(e) {}
    }

    function process(sym, price) {
        const target = parseFloat(document.getElementById(`target-${sym}`)?.value || 0);
        const threshold = parseFloat(document.getElementById('threshold').value) / 100;

        if (prices[sym]) {
            const change = Math.abs((price - prices[sym]) / prices[sym]);
            if (change >= threshold) {
                triggerAlert(sym, `Volatility Alert: ${sym} moved ${ (change*100).toFixed(2) }%`);
            }
        }
        
        // Client Call Target Logic
        if (target > 0 && ((prices[sym] < target && price >= target) || (prices[sym] > target && price <= target))) {
            triggerAlert(sym, `CALL CLIENTS: ${sym} reached target of ${target}`);
        }

        prices[sym] = price;
        updateCard(sym, price);
    }

    function triggerAlert(sym, msg) {
        const el = document.getElementById(`card-${sym}`);
        if(el) el.classList.add('alert-flash');
        speak(msg);
        setTimeout(() => el?.classList.remove('alert-flash'), 8000);
    }

    function updateCard(sym, price) {
        let el = document.getElementById(`card-${sym}`);
        if (!el) {
            el = document.createElement('div');
            el.id = `card-${sym}`; el.className = 'card';
            document.getElementById('marketGrid').appendChild(el);
        }
        el.innerHTML = `
            <h3>${sym}</h3>
            <div class="price">${price.toFixed(3)}</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#666; font-size:0.7rem;">CALL TARGET</span>
                <input type="number" id="target-${sym}" class="target-input" placeholder="0.00" value="${document.getElementById(`target-${sym}`)?.value || ''}">
            </div>
        `;
    }

    function toggleSystem() {
        isRunning = !isRunning;
        const btn = document.getElementById('sysBtn');
        if(isRunning) {
            btn.innerText = "Kill Core"; btn.style.background = "var(--danger)";
            const active = Array.from(document.querySelectorAll('.pc:checked')).map(p => p.value);
            let i = 0;
            const run = () => { fetchUpdate(active[i]); i = (i + 1) % active.length; };
            run();
            loop = setInterval(run, document.getElementById('interval').value * 1000);
        } else {
            clearInterval(loop);
            btn.innerText = "Launch Core"; btn.style.background = "var(--accent)";
        }
    }
</script>
</body>
</html>
